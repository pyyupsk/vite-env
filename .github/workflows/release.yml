name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Update release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -v "^${{ github.ref_name }}$" | head -1)
          bunx changelogithub --from "$PREV_TAG" --output /tmp/release-notes.md
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release edit "${{ github.ref_name }}" --notes-file /tmp/release-notes.md
          else
            gh release create "${{ github.ref_name }}" --notes-file /tmp/release-notes.md --title "${{ github.ref_name }}"
          fi

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")

          # Pack and publish core
          core_tarball=$(cd packages/core && bun pm pack --quiet | tr -d '\n')
          npm publish "packages/core/$core_tarball" --access public --provenance

          # bun pm pack resolves workspace:* to the last npm-published version, not
          # the current workspace version — patch it explicitly before packing cli
          trap 'git checkout packages/cli/package.json' EXIT
          sed -i "s|\"@vite-env/core\": \"workspace:\*\"|\"@vite-env/core\": \"^${CORE_VERSION}\"|" packages/cli/package.json
          grep -q "\"@vite-env/core\": \"\\^${CORE_VERSION}\"" packages/cli/package.json \
            || { echo "ERROR: failed to patch @vite-env/core version in packages/cli/package.json"; exit 1; }
          cli_tarball=$(cd packages/cli && bun pm pack --quiet | tr -d '\n')
          npm publish "packages/cli/$cli_tarball" --access public --provenance

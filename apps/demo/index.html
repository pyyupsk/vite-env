<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-env demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        line-height: 1.6;
        padding: 2rem;
        max-width: 640px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
        color: #fff;
      }

      .subtitle {
        color: #737373;
        font-size: 0.875rem;
        margin-bottom: 2rem;
      }

      h2 {
        font-size: 1rem;
        color: #a3a3a3;
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      section {
        margin-bottom: 2rem;
      }

      .env-grid {
        display: grid;
        gap: 0.5rem;
      }

      .env-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0.75rem;
        background: #171717;
        border-radius: 0.375rem;
        border: 1px solid #262626;
        font-size: 0.875rem;
      }

      .env-key {
        color: #a78bfa;
        font-family: monospace;
      }

      .env-value {
        color: #34d399;
        font-family: monospace;
      }

      .env-type {
        color: #737373;
        font-size: 0.75rem;
        margin-left: 0.5rem;
      }

      .warning {
        padding: 0.75rem;
        background: #1c1107;
        border: 1px solid #854d0e;
        border-radius: 0.375rem;
        color: #fbbf24;
        font-size: 0.875rem;
        font-family: monospace;
        white-space: pre-wrap;
      }

      a {
        color: #60a5fa;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      footer {
        margin-top: 3rem;
        padding-top: 1rem;
        border-top: 1px solid #262626;
        color: #525252;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
